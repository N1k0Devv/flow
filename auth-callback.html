<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Authenticating with Flow...</title>
    <meta name="robots" content="noindex, nofollow" />
    <link rel="icon" type="image/png" href="assets/img/brand/logo.png" />
    <style>
        body {
            background: #050508;
            color: #fff;
            font-family: 'Inter', system-ui, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }
        .container {
            text-align: center;
            padding: 40px;
            max-width: 400px;
        }
        .logo {
            width: 80px;
            height: 80px;
            background: #00ff88;
            border-radius: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 30px;
            box-shadow: 0 10px 40px rgba(0, 255, 136, 0.3);
            animation: pulse 2s infinite ease-in-out;
        }
        .spinner {
            width: 24px;
            height: 24px;
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-top: 2px solid #00ff88;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 20px;
        }
        h1 { font-size: 24px; margin-bottom: 12px; font-weight: 700; letter-spacing: -0.02em; }
        p { color: #888; font-size: 15px; line-height: 1.6; }
        .btn {
            margin-top: 30px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            color: #00ff88;
            padding: 12px 24px;
            border-radius: 12px;
            text-decoration: none;
            font-weight: 600;
            font-size: 14px;
            display: inline-block;
            transition: all 0.2s;
        }
        .btn:hover { background: rgba(0, 255, 136, 0.1); border-color: #00ff88; }
        
        @keyframes spin { to { transform: rotate(360deg); } }
        @keyframes pulse { 0%, 100% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.05); opacity: 0.8; } }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">
            <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#000" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"></path>
            </svg>
        </div>
        <div class="spinner"></div>
        <h1>Authenticating...</h1>
        <p>We're securely connecting your browser to the Flow desktop application. You should stay in flow.</p>
        
        <a href="flow-app://auth-callback" id="manual-link" class="btn" style="display: none;">Return to Flow Manually</a>
    </div>

    <script>
        // Extract the full hash/search which contains the session tokens
        const tokens = window.location.hash || window.location.search;
        
        if (tokens) {
            console.log("Tokens detected, bridging to app...");
            
            // Build the deep link URL
            const appUrl = "flow-app://auth-callback" + tokens;
            
            // 1. Automatic redirect
            window.location.href = appUrl;
            
            // 2. Fallback: Show manual button if automatic redirect doesn't trigger
            setTimeout(() => {
                const link = document.getElementById('manual-link');
                link.href = appUrl;
                link.style.display = 'inline-block';
            }, 2500);
        } else {
            document.querySelector('h1').innerText = "Session Not Found";
            document.querySelector('p').innerText = "We couldn't find your login session. Please try signing in again within the app.";
        }
    </script>
</body>
</html>
